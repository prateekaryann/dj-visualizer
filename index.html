<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Real-time mic-reactive 3D visualizer for DJs and electronic music" />
  <title>VIZORA — Live Visualizer</title>

  <!-- Google Fonts: preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Three.js mount target -->
  <div id="viz-container"></div>

  <!-- Floating lyrics overlay (mood words) -->
  <div id="lyric-overlay" aria-live="polite"></div>
  <div id="lyric-line" aria-live="polite"></div>

  <!-- Lyrics capture panel — slide-up from bottom -->
  <div id="lyrics-panel" class="lyrics-panel">
    <div class="lyrics-panel-header">
      <span class="lyrics-panel-title">CAPTURED LYRICS</span>
      <div class="lyrics-panel-actions">
        <button id="btn-lyrics-copy" type="button" title="Copy lyrics">COPY</button>
        <button id="btn-lyrics-clear" type="button" title="Clear lyrics">CLEAR</button>
        <button id="btn-lyrics-close" type="button" title="Close panel">&times;</button>
      </div>
    </div>
    <div id="lyrics-content" class="lyrics-panel-content">
      <div class="lyrics-empty">Enable LYRICS mode to start capturing...</div>
    </div>
    <div id="lyrics-interim" class="lyrics-interim"></div>
  </div>

  <!-- Particle config panel -->
  <div id="particle-config-panel" class="config-panel">
    <div class="config-panel-header">
      <span class="config-panel-title">PARTICLE CONFIG</span>
      <button id="btn-config-close" type="button" title="Close">&times;</button>
    </div>
    <div class="config-panel-content">
      <label class="config-toggle config-toggle-master">
        <input type="checkbox" id="cfg-enabled" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Particles ON/OFF</span>
      </label>
      <hr class="config-divider" />
      <label class="config-toggle">
        <input type="checkbox" id="cfg-beat-react" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Beat Reactivity</span>
      </label>
      <label class="config-toggle">
        <input type="checkbox" id="cfg-color-cycle" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Color Cycling</span>
      </label>
      <label class="config-toggle">
        <input type="checkbox" id="cfg-formation-morph" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Formation Morphing</span>
      </label>
      <label class="config-toggle">
        <input type="checkbox" id="cfg-shape-shift" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Shape Shifting</span>
      </label>
      <label class="config-toggle">
        <input type="checkbox" id="cfg-camera-shake" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Camera Shake</span>
      </label>
      <label class="config-toggle">
        <input type="checkbox" id="cfg-displacement" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Wave Displacement</span>
      </label>
      <label class="config-toggle">
        <input type="checkbox" id="cfg-connections" checked />
        <span class="toggle-slider"></span>
        <span class="toggle-label">Particle Connections</span>
      </label>
      <div class="config-slider-group">
        <label class="config-slider-label">Particle Size</label>
        <input type="range" id="cfg-particle-size" min="0.2" max="4" step="0.1" value="1" class="config-slider" />
      </div>
      <div class="config-slider-group">
        <label class="config-slider-label">Speed</label>
        <input type="range" id="cfg-speed" min="0.1" max="2" step="0.05" value="1" class="config-slider" />
      </div>
      <div class="config-slider-group">
        <label class="config-slider-label">Chaos</label>
        <input type="range" id="cfg-chaos" min="0" max="1" step="0.05" value="0.1" class="config-slider" />
      </div>
    </div>
  </div>

  <!-- UI overlay -->
  <div id="ui">

    <!-- Top-left: brand -->
    <div id="brand">
      <svg id="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 24" aria-hidden="true" focusable="false">
        <polyline points="0,12 4,12 6,4 9,20 12,8 15,16 18,10 21,14 24,6 27,18 30,10 33,14 36,12 40,12"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      <span id="brand-name">VIZORA</span>
    </div>

    <!-- Top-right: controls -->
    <div id="top-controls">
      <button id="btn-lyrics" type="button" aria-label="Toggle lyrics mode" aria-pressed="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>LYRICS</span>
      </button>
      <button id="btn-mic" type="button" aria-label="Toggle microphone input" aria-pressed="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <rect x="9" y="2" width="6" height="11" rx="3" ry="3"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M5 10a7 7 0 0 0 14 0"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="21"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>TAP MIC</span>
      </button>

      <button id="btn-fullscreen" type="button" aria-label="Toggle fullscreen">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <polyline points="4,9 4,4 9,4"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="15,4 20,4 20,9"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="20,15 20,20 15,20"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="9,20 4,20 4,15"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Bottom bar -->
    <div id="bottom-bar">

      <!-- Visualization mode selector -->
      <div id="viz-mode-selector" role="tablist" aria-label="Visualization mode" style="display: none;">
        <button type="button" role="tab" data-mode="default" aria-selected="true" class="viz-mode-tab active" title="Classic particle system">DEFAULT</button>
        <button type="button" role="tab" data-mode="julia" aria-selected="false" class="viz-mode-tab" title="Julia set fractal">JULIA</button>
        <button type="button" role="tab" data-mode="parametric" aria-selected="false" class="viz-mode-tab" title="Parametric surfaces">SURFACE</button>
        <button type="button" role="tab" data-mode="metaball" aria-selected="false" class="viz-mode-tab" title="Organic blobs">METABALL</button>
        <button type="button" role="tab" data-mode="particle-morph" aria-selected="false" class="viz-mode-tab" title="Particle morphing shapes">MORPH</button>
        <button type="button" role="tab" data-mode="humanoid" aria-selected="false" class="viz-mode-tab" title="Humanoid particle formation">HUMANOID</button>
      </div>

      <!-- Scene selector tabs -->
      <div id="scene-tabs" role="tablist" aria-label="Visualizer scene">
        <button type="button" role="tab" data-scene="TECHNO" aria-selected="true"  class="scene-tab active">TECHNO</button>
        <button type="button" role="tab" data-scene="TRANCE" aria-selected="false" class="scene-tab">TRANCE</button>
        <button type="button" role="tab" data-scene="HOUSE"  aria-selected="false" class="scene-tab">HOUSE</button>
        <button type="button" role="tab" data-scene="MINIMAL" aria-selected="false" class="scene-tab">MINIMAL</button>
        <button type="button" role="tab" data-scene="ACID"   aria-selected="false" class="scene-tab">ACID</button>
      </div>

      <!-- Tap tempo -->
      <div id="tap-tempo">
        <button id="btn-tap" type="button" aria-label="Tap to set BPM">TAP BPM</button>
        <span id="bpm-display" aria-live="polite">-- BPM</span>
      </div>

      <!-- Particle config -->
      <button id="btn-particle-config" type="button" class="scene-tab" aria-label="Particle animation settings" title="Particle settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false" style="vertical-align:-2px;margin-right:4px">
          <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>CONFIG
      </button>

      <!-- Show lyrics panel -->
      <button id="btn-show-lyrics" type="button" class="scene-tab" aria-label="Show captured lyrics">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false" style="vertical-align:-2px;margin-right:4px">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <polyline points="14 2 14 8 20 8"
            fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>LYRICS
      </button>

      <!-- Mic status indicator -->
      <div id="status-dot" aria-live="polite" aria-label="Microphone status">
        <span id="status-dot-pulse"></span>
        <span id="status-dot-label">LISTENING</span>
      </div>

    </div><!-- /#bottom-bar -->

  </div><!-- /#ui -->

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Post-processing for humanoid visualizer -->
  <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>

  <!-- App scripts (order matters) -->
  <script src="js/audio-metrics.js"></script>
  <script src="js/visualizer-bg.js"></script>
  <script src="js/mic-analyser.js"></script>
  <script src="js/lyric-engine.js"></script>
  <script src="js/julia-set-visualizer.js"></script>
  <script src="js/metaball-visualizer.js"></script>
  <script src="js/parametric-surface-visualizer.js"></script>
  <script src="js/particle-morph-visualizer.js"></script>
  <script src="js/humanoid-visualizer.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
